[tool.ruff]
# 代码行宽，88 是 Black 标准，如果觉得太短可以改到 100
line-length = 88
# 目标 Python 版本
target-version = "py312"

[tool.ruff.lint]
# 启用的规则集
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (基础逻辑错误)
    "I",   # isort (导包排序)
    "UP",  # pyupgrade (自动升级新语法)
    "B",   # flake8-bugbear (发现潜在 Bug)
    "SIM", # flake8-simplify (简化代码)
    "N",   # pep8-naming (命名规范)
    "PTH", # flake8-use-pathlib (建议使用 Pathlib 代替 os.path)
    "BLE", # flake8-blind-except (禁止盲目捕获 Exception)
    "RUF", # Ruff 专有规则 (如全角逗号检查)
    "D",   # pydocstyle (文档字符串规范)
]

ignore = [
    "W191",   # 警告：该规则禁止使用 Tab，与你的 Tab 缩进设置冲突
    "D206",   # 警告：该规则强制 docstring 使用空格，与 Tab 冲突
    "D203",   # 冲突：类定义前不需要空行
    "D213",   # 冲突：多行摘要从第二行开始
    "D100", "D101", "D102", "D103", "D104", # 忽略缺失文档字符串的检查
    "E501",   # 选做：如果你不想被行宽限制折磨
]

[tool.ruff.lint.mccabe]
# 复杂度检查阈值，默认 10。如果你觉得 run_monitor 太复杂改不动，可以调到 15
max-complexity = 12

[tool.ruff.format]
# 保持程序员常用的单引号习惯（如果你喜欢双引号可以改为 "double"）
quote-style = "double"
# 自动缩进使用空格
indent-style = "tab"